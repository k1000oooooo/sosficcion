name: Deploy a GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Project page: se sirve en k1000oooooo.github.io/sosficcion.
      # Si el sitio pasa a dominio propio (CNAME), BORRAR esta variable
      # para que el build sirva desde la raíz.
      BASE_PATH: /sosficcion/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # ID público de Formspree (viaja en el bundle del cliente igual)
          VITE_FORMSPREE_ID: meebbwdb
      # Smoke test contra el build real (Chrome viene preinstalado en el runner)
      - run: npm run smoke
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
